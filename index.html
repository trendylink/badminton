<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球結算表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #f5f7fb; color: #333; padding: 12px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; display: none; }
        .loading { padding: 40px; text-align: center; font-size: 16px; color: #666; font-weight: bold; }
        
        .header { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 24px 16px; text-align: center; }
        .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 2px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .header .remark { font-size: 12px; color: #ffeaa7; font-weight: bold; margin-top: 4px; letter-spacing: 0.5px; }
        
        .selector-box { padding: 12px 16px; border-bottom: 1px solid #eee; background: #fafafa; display: flex; gap: 10px; }
        .select-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .select-group label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; outline: none; background: white; width: 100%; }

        .main-content { padding: 16px; }
        
        .summary-card { background: #fff5f5; border: 1px solid #ffe3e3; border-left: 6px solid #ff4d4d; padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .summary-card.is-paid { background: #f4fbf7; border: 1px solid #d1f2e1; border-left: 6px solid #27ae60; }
        .total-label { font-size: 14px; color: #666; font-weight: 500; }
        .total-amount { font-size: 32px; font-weight: bold; color: #ff4d4d; }
        .summary-card.is-paid .total-amount { color: #27ae60; }
        .status-badge { color: white; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 4px; display: inline-block; }
        .status-badge.unpaid { background: #ff4d4d; }
        .status-badge.paid { background: #27ae60; }

        .copy-amt-btn { background: rgba(0,0,0,0.05); color: #555; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .session-card { background: #fff; border: 1px solid #eaeaea; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; color: #11998e; margin-bottom: 8px; border-bottom: 1px solid #f5f5f5; padding-bottom: 6px; }
        .card-body { font-size: 13px; color: #555; line-height: 1.6; }
        .row-detail { display: flex; justify-content: space-between; margin-top: 2px; }
        .row-total { display: flex; justify-content: space-between; font-weight: bold; margin-top: 6px; padding-top: 4px; border-top: 1px dashed #ddd; }

        .pay-box { background: #fdfefe; border: 1px solid #e1e8ed; border-radius: 12px; padding: 16px; margin-top: 20px; }
        .pay-btn { background: #11998e; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 8px; font-size: 14px; cursor: pointer; }
        
        /* 獨立 WhatsApp 區塊 */
        .whatsapp-box { background: #f4fbf7; border: 1px solid #d1f2e1; border-radius: 12px; padding: 16px; margin-top: 14px; text-align: center; }
    </style>
</head>
<body>

<div id="loading" class="loading">📡 正在實時連線 Google Sheet...</div>

<div class="app-container" id="app">
    <div class="header">
        <h1>🏸 羽毛球費用查閱系統</h1>
        <p id="headerSub">請在下方選擇隊員</p>
        <div class="remark">⚠️ *羽毛球*費於月尾計算</div>
    </div>

    <div class="selector-box">
        <div class="select-group">
            <label>📅 選擇月份</label>
            <select id="monthSelect" onchange="renderBill()"></select>
        </div>
        <div class="select-group">
            <label>👤 選擇隊員</label>
            <select id="memberSelect" onchange="renderBill()"></select>
        </div>
    </div>

    <div class="main-content">
        <div class="summary-card" id="summaryCard">
            <div>
                <span class="total-label">本月應付總額</span><br>
                <span id="statusBadge" class="status-badge unpaid">🔴 未付款</span>
            </div>
            <div style="text-align: right;">
                <span class="total-amount" id="totalAmount">$0.00</span><br>
                <button class="copy-amt-btn" id="copyAmtBtn" onclick="copyCurrentAmount()" style="display: none;">📋 複製金額</button>
            </div>
        </div>

        <div id="sessionList"></div>

        <div class="pay-box" id="payBox" style="display: none;">
            <p style="font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #444;">📲 選擇付款方式</p>
            <button class="pay-btn" style="background: #ff4d4d; margin: 0;" onclick="navigator.clipboard.writeText('61866188'); alert('已複製 FPS 號碼')">轉賬至 FPS (一鍵複製號碼)</button>
            <button class="pay-btn" style="background: #e71d36; margin: 0;" onclick="window.location.href='https://payme.hsbc/5e115e6f63ec45a6b5e843a7fc08b3d3'">使用 PayMe 付款</button>
            <button class="pay-btn" style="background: #00a4e4; margin: 0;" onclick="window.open('https://qr.alipay.hk/281004010496IPnb5AYmN49jpe8Zkbb48dyG', '_blank')">使用 Alipay 付款</button>
        </div>

        <div class="whatsapp-box" id="whatsappBox" style="display: none;">
            <p style="font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #27ae60;">👍 付款後請通知收款人確認</p>
            <button class="pay-btn" style="background: #25D366; margin: 0;" onclick="sendWhatsAppNotification()">
                💬 WhatsApp 通知收款人 (帶入已付金額)
            </button>
        </div>
    </div>
</div>

</body>
</html>
